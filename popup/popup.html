<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Time Tracker</title>
</head>

<body>

  <header>
    <div class="logo">time<span>tracker</span></div>
  </header>

  <div class="current-card">
    <div class="current-label">current site</div>
    <div class="current-hostname" id="currentHost">—</div>
    <div class="current-time" id="currentTime">0m 0s</div>
  </div>

  <div class="section-title">today's activity</div>
  <div class="site-list" id="siteList">
    <div class="empty">No data yet. Start browsing!</div>
  </div>


  <script src="popup.js"></script>
</body>

</html>
